<!DOCTYPE html>
<html>

<head>
<title>OCR Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

#preview{
max-width:350px;
margin-top:20px;
}

textarea{
width:80%;
height:150px;
margin-top:20px;
}

</style>

</head>


<body>

<h2>Upload or Take Photo</h2>

<input type="file" id="imageInput" accept="image/*" capture>

<br>

<img id="preview">

<br>

<textarea id="outputText" placeholder="Detected text will appear here"></textarea>


<script>

const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const output = document.getElementById("outputText");


input.addEventListener("change", function(event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

preview.src = e.target.result;

processImage(e.target.result);

};

reader.readAsDataURL(file);

});


function processImage(imageSrc){

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");
const img = new Image();

img.onload = function(){

canvas.width = img.width * 2;
canvas.height = img.height * 2;

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
const data = imageData.data;

for(let i=0;i<data.length;i+=4){

const avg = (data[i] + data[i+1] + data[i+2]) / 3;

data[i] = avg * 1.4;
data[i+1] = avg * 1.4;
data[i+2] = avg * 1.4;

}

ctx.putImageData(imageData,0,0);

runOCR(canvas);

};

img.src = imageSrc;

}


function runOCR(image){

output.value = "Scanning...";

Tesseract.recognize(
image,
"eng",
{
tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,!?()-:/ "
}

).then(({ data:{ text } }) => {

console.log(text);

output.value = text;

});

}

</script>


</body>

</html>
