<!DOCTYPE html>
<html>
<head>
  <title>Browser OCR Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 40px;
    }
    #imageInput {
      margin-top: 20px;
    }
    #preview {
      margin-top: 20px;
      max-width: 350px;
    }
    #outputText {
      width: 80%;
      height: 150px;
      margin-top: 20px;
      font-size: 14px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Upload or Take Photo</h2>

<!-- Visible input to ensure native dropdown menu -->
<input type="file" id="imageInput" accept="image/*" capture="environment">

<br>

<img id="preview" alt="Image preview">

<br>

<textarea id="outputText" placeholder="Detected text will appear here..."></textarea>

<script>
const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const output = document.getElementById("outputText");

input.addEventListener("change", function(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    preview.src = e.target.result;
    runOCR(e.target.result);
  };
  reader.readAsDataURL(file);
});

function runOCR(imageSrc){
  output.value = "Scanning...";

  const img = new Image();
  img.onload = function(){

    // Create canvas for preprocessing
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    // Scale up for better OCR accuracy
    const scale = 2;
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;

    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    // Get image data
    const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
    const data = imageData.data;

    // Grayscale + simple contrast adjustment
    for(let i=0; i<data.length; i+=4){
      let avg = (data[i] + data[i+1] + data[i+2]) / 3;
      avg = avg * 1.4; // increase contrast
      if(avg>255) avg=255;
      data[i] = data[i+1] = data[i+2] = avg;
    }
    ctx.putImageData(imageData,0,0);

    // Run Tesseract OCR on preprocessed image
    Tesseract.recognize(
      canvas,
      "eng",
      {
        logger: m => console.log(m),
        tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.,!?()-:/ "
      }
    ).then(({ data:{ text } }) => {
      console.log("Detected text:", text);
      output.value = text;
    }).catch(err=>{
      console.error(err);
      output.value = "OCR failed. Try a clearer photo.";
    });

  };
  img.src = imageSrc;
}
</script>

</body>
</html>
